<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patient Registration - 23CS Hospital</title>

<style>
* {
  box-sizing: border-box;
  font-family: "Segoe UI", sans-serif;
}

body {
  margin: 0;
  height: 100vh;
  background: url(back.jpeg) no-repeat center center/cover;
  display: flex;
  align-items: center;
  justify-content: center;
}

.overlay {
  background: rgba(0,0,0,0.6);
  padding: 30px;
  border-radius: 15px;
  width: 100%;
  max-width: 400px;
  color: white;
  box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

input, button {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  border: none;
  font-size: 14px;
}

input {
  background: #f1f1f1;
}

input:focus {
  outline: none;
  border: 2px solid #0077cc;
}

button {
  background: #0077cc;
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #005fa3;
}

#generateBtn {
  background: #28a745;
}

#generateBtn:hover {
  background: #1e7e34;
}

#response {
  text-align: center;
  margin-top: 10px;
  font-weight: bold;
}
  /* =========================
   📱 RESPONSIVE DESIGN
========================= */

/* Mobile default */
body {
  font-size: 14px;
}

/* Tablet */
@media (min-width: 600px) {
  body {
    font-size: 15px;
  }

  .chat-container {
    max-width: 700px;
  }
}

/* Desktop */
@media (min-width: 1024px) {
  body {
    font-size: 16px;
  }

  .chat-container {
    max-width: 900px;
  }
}

/* Message bubbles adjust */
@media (min-width: 768px) {
  .message-bubble {
    max-width: 60%;
    font-size: 15px;
  }
}

/* Input + button fix */
input, select, button {
  font-size: 16px;
  width: 100%;
}

/* Desktop form layout */
@media (min-width: 768px) {
  #messageForm {
    flex-direction: row;
  }

  #message {
    flex: 1;
  }

  button {
    width: auto;
  }
}
</style>
</head>

<body>

<div class="overlay">

<h2>23CS Hospital<br>Patient Registration</h2>

<form id="registerForm">

  <input type="text" id="name" placeholder="First Name" required>
  <input type="text" id="surname" placeholder="Surname" required>

  <input type="email" id="email" placeholder="Email" required>
  <input type="tel" id="phone" placeholder="Phone Number" required>
  <input type="tel" id="emergency" placeholder="Emergency Contact" required>

  <input type="password" id="password" placeholder="Create Password" required>

  <!-- GENERATE ID -->
  <button type="button" id="generateBtn">Generate Patient ID</button>

  <input type="text" id="patientId" placeholder="Generated Patient ID" readonly required>

  <button type="submit">Register</button>

</form>

<p id="response"></p>

</div>

<script>
const backendUrl = "https://zeeland-hospital-backend-2.onrender.com";

// GENERATE ID
document.getElementById("generateBtn").onclick = () => {
  const id = "PT" + Math.floor(100000 + Math.random() * 900000);
  document.getElementById("patientId").value = id;
};

// REGISTER
document.getElementById("registerForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const patientId = document.getElementById("patientId").value;

  if (!patientId) {
    return show("❌ Generate Patient ID first", "red");
  }

  const payload = {
    name: document.getElementById("name").value,
    surname: document.getElementById("surname").value,
    email: document.getElementById("email").value,
    phone: document.getElementById("phone").value,
    emergency: document.getElementById("emergency").value,
    password: document.getElementById("password").value,
    patientId
  };

  try {
    const res = await fetch(`${backendUrl}/api/registerPatient`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    const data = await res.json();

    if (res.ok) {
      show("✅ Registration successful! Redirecting...", "lightgreen");

      setTimeout(() => {
        window.location.href = "login.html";
      }, 2000);

    } else {
      show("❌ " + (data.message || "Registration failed"), "red");
    }

  } catch {
    show("❌ Server error", "red");
  }
});

// SHOW MESSAGE
function show(msg, color) {
  const el = document.getElementById("response");
  el.style.color = color;
  el.textContent = msg;
}
</script>

</body>
</html>
