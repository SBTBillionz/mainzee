<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Patient Dashboard - 23CS Hospital</title>

  <style>
    body {
      font-family: "Segoe UI", sans-serif;
      background-color: #e5ddd5;
      margin: 0;
    }

    .chat-container {
      display: flex;
      flex-direction: column;
      max-width: 700px;
      margin: auto;
      height: 100vh;
      background-color: #f0f0f0;
    }

    .top-bar {
      background-color: #128c7e;
      color: white;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .controls {
      padding: 10px;
      background: #fff;
    }

    select, .emergency-btn {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 5px;
    }

    .emergency-btn {
      background: red;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      background-color: #fff;
    }

    .message-bubble {
      max-width: 75%;
      padding: 10px;
      border-radius: 10px;
      margin: 8px 0;
      font-size: 14px;
    }

    .from-me {
      background-color: #34b7f1;
      color: white;
      margin-left: auto;
      text-align: right;
    }

    .from-them {
      background-color: #e4e4e4;
      color: #333;
      margin-right: auto;
    }

    #messageForm {
      display: flex;
      padding: 10px;
      background: #eee;
    }

    #message {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: 1px solid #ccc;
    }

    button {
      background: #128c7e;
      color: white;
      border: none;
      padding: 10px;
      margin-left: 5px;
      border-radius: 20px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="chat-container">

  <!-- TOP BAR -->
  <div class="top-bar">
    <strong>Patient Dashboard</strong>
    <button onclick="logout()">Logout</button>
  </div>

  <!-- CONTROLS -->
  <div class="controls">

    <!-- SPECIALTY DROPDOWN -->
    <select id="specialty">
      <option value="">Select Doctor Specialty</option>
      <option value="oncologist">Oncologist</option>
      <option value="surgeon">Surgeon</option>
      <option value="psychiatrist">Psychiatrist</option>
    </select>

    <!-- EMERGENCY BUTTON -->
    <button class="emergency-btn" onclick="callEmergency()">
      🚨 Emergency Call (08139383653)
    </button>

  </div>

  <!-- MESSAGES -->
  <div id="messages"></div>

  <!-- MESSAGE FORM -->
  <form id="messageForm">
    <input type="text" id="message" placeholder="Type a message..." required />
    <button type="submit">Send</button>
  </form>

</div>

<script>
const backendUrl = "https://zeeland-hospital-backend-2.onrender.com";
const patientId = localStorage.getItem("patientId");

// MAP SPECIALTY → DOCTOR
const doctors = {
  oncologist: "oncologist@gmail.com",
  surgeon: "surgeon@gmail.com",
  psychiatrist: "psychiatrist@gmail.com"
};

let doctorEmail = localStorage.getItem("doctorEmail");

// REDIRECT IF NOT LOGGED IN
if (!patientId) {
  window.location.href = "login.html";
}

// LOGOUT
function logout() {
  localStorage.clear();
  window.location.href = "index.html";
}

// SELECT SPECIALTY
document.getElementById("specialty").addEventListener("change", (e) => {
  const selected = e.target.value;

  if (!selected) return;

  doctorEmail = doctors[selected];
  localStorage.setItem("doctorEmail", doctorEmail);

  alert("✅ Connected to " + selected + " doctor");
});

// EMERGENCY CALL
function callEmergency() {
  window.location.href = "tel:08139383653";
}

// LOAD MESSAGES
async function loadMessages() {
  try {
    const res = await fetch(`${backendUrl}/api/messages?patientId=${patientId}`);
    const data = await res.json();

    const box = document.getElementById("messages");

    box.innerHTML = data.map(m => {
      const isMe = m.from === patientId;

      return `
        <div class="message-bubble ${isMe ? 'from-me' : 'from-them'}">
          ${m.message}
        </div>
      `;
    }).join("");

    box.scrollTop = box.scrollHeight;

  } catch {
    document.getElementById("messages").innerText = "❌ Error loading messages.";
  }
}

// SEND MESSAGE
document.getElementById("messageForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  if (!doctorEmail) {
    alert("⚠️ Please select a doctor specialty first");
    return;
  }

  const msg = document.getElementById("message");

  try {
    await fetch(`${backendUrl}/api/messages`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        from: patientId,
        to: doctorEmail,
        message: msg.value
      })
    });

    msg.value = "";
    loadMessages();

  } catch {
    alert("❌ Failed to send message.");
  }
});

// INITIAL LOAD
loadMessages();
setInterval(loadMessages, 5000);
</script>

</body>
</html>
