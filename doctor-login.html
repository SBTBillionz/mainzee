<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doctor Login - 23CS Hospital</title>
  <style>
    body {
      font-family: Arial;
      max-width: 500px;
      margin: auto;
      padding: 20px;
      background-repeat: no-repeat;
      background-size: cover;
      background-image: url(back.jpeg);
    }
    h2 {
      color: white;
      margin-left: 115px;
      margin-bottom: -20px;
    }
    form {
      /* background: rgba(46, 62, 82, 0.5); */
      padding: 30px;
      width: 350px;
      text-align: center;
    }
    button {
      padding: 12px;
      font-size: 16px;
      background-color: whitesmoke;
      color: blue;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover {
      background-color: #619fcf;
    }
    input, button {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
    }
    /* =========================
   📱 RESPONSIVE DESIGN
========================= */

/* Mobile default */
body {
  font-size: 14px;
}

/* Tablet */
@media (min-width: 600px) {
  body {
    font-size: 15px;
  }

  .chat-container {
    max-width: 700px;
  }
}

/* Desktop */
@media (min-width: 1024px) {
  body {
    font-size: 16px;
  }

  .chat-container {
    max-width: 900px;
  }
}

/* Message bubbles adjust */
@media (min-width: 768px) {
  .message-bubble {
    max-width: 60%;
    font-size: 15px;
  }
}

/* Input + button fix */
input, select, button {
  font-size: 16px;
  width: 100%;
}

/* Desktop form layout */
@media (min-width: 768px) {
  #messageForm {
    flex-direction: row;
  }

  #message {
    flex: 1;
  }

  button {
    width: auto;
  }
}
  </style>
</head>
<body>
  <h2>Doctor Login</h2>
  <form id="loginForm">
    <input type="email" id="email" placeholder="Doctor Email" required>
    <input type="password" id="password" placeholder="Password" required>
    <button type="submit">Login</button>
  </form>
  <p id="response"></p>

  <script>
    const backendUrl = "https://zeeland-hospital-backend-2.onrender.com";

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const payload = {
        email: document.getElementById("email").value,
        password: document.getElementById("password").value
      };

      try {
        const res = await fetch(`${backendUrl}/api/loginDoctor`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const data = await res.json();
        if (res.ok) {
          localStorage.setItem("doctorEmail", payload.email);
          window.location.href = "doctor-dashboard.html";
        } else {
          document.getElementById("response").innerText = data.error || "Login failed.";
        }
      } catch (err) {
        document.getElementById("response").innerText = "❌ Error connecting to server.";
      }
    });
  </script>
</body>
</html>
