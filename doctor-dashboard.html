<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doctor Dashboard - 23CS Hospital</title>

<style>
  body {
    font-family: "Segoe UI", sans-serif;
    background-color: #e5ddd5;
    margin: 0;
    padding: 0;
  }

  .chat-container {
    display: flex;
    flex-direction: column;
    max-width: 700px;
    margin: auto;
    height: 100vh;
    background-color: #f0f0f0;
    border-left: 1px solid #ccc;
    border-right: 1px solid #ccc;
  }

  .top-bar {
    background-color: #075e54;
    color: white;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .profile-section {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .profile-section img {
    width: 35px;
    height: 35px;
    border-radius: 50%;
    border: 2px solid white;
  }

  .logout-btn {
    background: #d9534f;
    color: white;
    border: none;
    padding: 8px 12px;
    border-radius: 5px;
    cursor: pointer;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    background-color: #dcf8c6;
  }

  .message-bubble {
    max-width: 75%;
    padding: 10px 14px;
    border-radius: 10px;
    margin: 8px 0;
    line-height: 1.4;
    font-size: 14px;
    word-wrap: break-word;
  }

  .from-me {
    background-color: #34b7f1;
    color: white;
    margin-left: auto;
    text-align: right;
    border-bottom-right-radius: 0;
  }

  .from-them {
    background-color: white;
    color: #333;
    margin-right: auto;
    text-align: left;
    border-bottom-left-radius: 0;
  }

  .timestamp {
    font-size: 10px;
    color: #888;
    margin-top: 4px;
  }

  #messageForm {
    display: flex;
    flex-direction: column;
    padding: 10px;
    background-color: #f0f0f0;
    border-top: 1px solid #ccc;
  }

  #message {
    padding: 10px;
    font-size: 14px;
    border-radius: 20px;
    border: 1px solid #ccc;
    margin-bottom: 5px;
    flex: 1;
   overflow-y: auto;
   padding: 20px;
}

  
  #fileInput {
    margin-bottom: 5px;
  }

  button {
    background-color: #075e54;
    color: white;
    border: none;
    border-radius: 20px;
    padding: 10px;
    cursor: pointer;
    font-size: 14px;
  }

  select {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
  }
  /* =========================
   DESKTOP WHATSAPP STYLE
========================= */

.sidebar {
  display: none;
  background: #fff;
  padding: 15px;
  border-right: 1px solid #ccc;
}

.chat-area {
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* Desktop layout */
@media (min-width: 1024px) {
  .chat-container {
    flex-direction: row;
    max-width: 1200px;
  }

  .sidebar {
    display: block;
    width: 30%;
  }

  .chat-area {
    width: 70%;
  }
}
  /* =========================
   📱 RESPONSIVE DESIGN
========================= */

/* Mobile default */
body {
  font-size: 14px;
}

/* Tablet */
@media (min-width: 600px) {
  body {
    font-size: 15px;
  }

  .chat-container {
    max-width: 700px;
  }
}

/* Desktop */
@media (min-width: 1024px) {
  body {
    font-size: 16px;
  }

  .chat-container {
    max-width: 900px;
  }
}

/* Message bubbles adjust */
@media (min-width: 768px) {
  .message-bubble {
    max-width: 60%;
    font-size: 15px;
  }
}

/* Input + button fix */
input, select, button {
  font-size: 16px;
  width: 100%;
}

/* Desktop form layout */
@media (min-width: 768px) {
  #messageForm {
    flex-direction: row;
  }

  #message {
    flex: 1;
  }

  button {
    width: auto;
  }
}
</style>
</head>

<body>

<div class="chat-container">

  <!-- LEFT SIDEBAR -->
  <div class="sidebar">
    <h3>Patients</h3>
    <select id="patientSelect"></select>
  </div>

  <!-- RIGHT CHAT AREA -->
  <div class="chat-area">

    <div class="top-bar">
      <div class="profile-section">
        <img src="https://www.svgrepo.com/show/382106/avatar-doctor-male.svg">
        <strong>Dr. 23CS1029</strong>
      </div>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div id="messages"></div>

    <form id="messageForm">
      <input type="text" id="message" placeholder="Type a message..." required />
      <button type="submit">Send</button>
    </form>

  </div>
</div>

  <select id="patientSelect"></select>

  <div id="messages"></div>

  <form id="messageForm">
    <input type="text" id="message" placeholder="Type a message..." required>
    
    <!-- FILE UPLOAD -->
    <input type="file" id="fileInput">

    <button type="submit">Send</button>
  </form>

</div>

<script>
const backendUrl = "https://zeeland-hospital-backend-2.onrender.com";
const doctorEmail = localStorage.getItem("doctorEmail");

if (!doctorEmail) {
  window.location.href = "doctor-login.html";
}

function logout() {
  localStorage.removeItem("doctorEmail");
  window.location.href = "index.html";
}

let lastRendered = "";

async function loadPatients() {
  const res = await fetch(`${backendUrl}/api/patients`);
  const data = await res.json();

  document.getElementById("patientSelect").innerHTML =
    data.map(p => `<option value="${p.patientId}">
      ${p.name} ${p.surname} (${p.patientId})
    </option>`).join('');

  loadMessages();
}

async function loadMessages() {
  const patientId = document.getElementById("patientSelect").value;

  if (!patientId) return;

  const res = await fetch(`${backendUrl}/api/messages?patientId=${patientId}`);
  const data = await res.json();

  const html = data.map(m => {
    const isMe = m.from === doctorEmail;
    const sender = isMe ? "You" : "Patient";
    const time = new Date(m.createdAt).toLocaleTimeString();

    return `
      <div class="message-bubble ${isMe ? "from-me" : "from-them"}">

        <div>${m.message || ""}</div>

        ${m.fileUrl ? `
          <img src="${backendUrl + m.fileUrl}" 
               style="max-width:200px;border-radius:10px;margin-top:5px;">
        ` : ""}

        <div class="timestamp">${sender} • ${time}</div>
      </div>
    `;
  }).join("");

  if (html !== lastRendered) {
    document.getElementById("messages").innerHTML = html;
    document.getElementById("messages").scrollTop =
      document.getElementById("messages").scrollHeight;

    lastRendered = html;
  }
}

document.getElementById("messageForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const to = document.getElementById("patientSelect").value;
  const message = document.getElementById("message").value;
  const file = document.getElementById("fileInput").files[0];

  const formData = new FormData();
  formData.append("from", doctorEmail);
  formData.append("to", to);
  formData.append("message", message);

  if (file) {
    formData.append("file", file);
  }

  await fetch(`${backendUrl}/api/messages`, {
    method: "POST",
    body: formData
  });

  document.getElementById("message").value = "";
  document.getElementById("fileInput").value = "";

  loadMessages();
});

document.getElementById("patientSelect").addEventListener("change", () => {
  lastRendered = "";
  loadMessages();
});

loadPatients();
setInterval(loadMessages, 3000);
</script>

</body>
</html>
