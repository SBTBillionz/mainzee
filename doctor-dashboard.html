<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doctor Dashboard</title>

<style>
body {
  font-family: "Segoe UI", sans-serif;
  margin: 0;
  background: #e5ddd5;
}

/* CONTAINER */
.chat-container {
  display: flex;
  height: 100vh;
}

/* SIDEBAR (DESKTOP) */
.sidebar {
  width: 30%;
  background: #fff;
  border-right: 1px solid #ccc;
  padding: 10px;
  display: none;
}

/* CHAT AREA */
.chat-area {
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* TOP BAR */
.top-bar {
  background: #075e54;
  color: white;
  padding: 15px;
  display: flex;
  justify-content: space-between;
}

#messages {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
  background: #dcf8c6;
}

/* MESSAGE */
.message-bubble {
  max-width: 70%;
  padding: 10px;
  border-radius: 10px;
  margin: 8px 0;
}

.from-me {
  background: #34b7f1;
  color: white;
  margin-left: auto;
}

.from-them {
  background: white;
}

.timestamp {
  font-size: 10px;
  color: gray;
}

/* INPUT AREA */
.chat-input {
  display: flex;
  align-items: center;
  padding: 10px;
  background: #f0f0f0;
}

.chat-input input {
  flex: 1;
  padding: 10px;
  border-radius: 20px;
  border: none;
  margin: 0 10px;
}

.icon {
  font-size: 20px;
  cursor: pointer;
}

#sendBtn {
  background: #25d366;
  color: white;
  border: none;
  border-radius: 50%;
  width: 40px;
  height: 40px;
}

/* RESPONSIVE */
@media (min-width: 768px) {
  .sidebar {
    display: block;
  }
}
</style>
</head>

<body>

<div class="chat-container">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h3>Patients</h3>
    <select id="patientSelect"></select>
  </div>

  <!-- CHAT -->
  <div class="chat-area">

    <div class="top-bar">
      <strong>Doctor Chat</strong>
      <button onclick="logout()">Logout</button>
    </div>

    <div id="messages"></div>

    <!-- INPUT -->
    <form id="messageForm" class="chat-input">

      😊

      <input type="text" id="message" placeholder="Message">

      <!-- FILE -->
      <label for="fileInput" class="icon">📎</label>
      <input type="file" id="fileInput" hidden>

      <!-- CAMERA -->
      <label for="cameraInput" class="icon">📷</label>
      <input type="file" id="cameraInput" accept="image/*" capture="environment" hidden>

      <button id="sendBtn">➤</button>

    </form>

  </div>
</div>

<script>
const backendUrl = "https://zeeland-hospital-backend-2.onrender.com";
const doctorEmail = localStorage.getItem("doctorEmail");

if (!doctorEmail) {
  window.location.href = "doctor-login.html";
}

function logout() {
  localStorage.removeItem("doctorEmail");
  window.location.href = "index.html";
}

let lastRendered = "";

/* LOAD PATIENTS */
async function loadPatients() {
  const res = await fetch(`${backendUrl}/api/patients`);
  const data = await res.json();

  document.getElementById("patientSelect").innerHTML =
    data.map(p => `<option value="${p.patientId}">
      ${p.name} (${p.patientId})
    </option>`).join('');

  loadMessages();
}

/* LOAD MESSAGES */
async function loadMessages() {
  const patientId = document.getElementById("patientSelect").value;
  if (!patientId) return;

  const res = await fetch(`${backendUrl}/api/messages?patientId=${patientId}`);
  const data = await res.json();

  const html = data.map(m => {
    const isMe = m.from === doctorEmail;
    const time = new Date(m.createdAt).toLocaleTimeString();

    return `
      <div class="message-bubble ${isMe ? "from-me" : "from-them"}">

        <div>${m.message || ""}</div>

        ${m.fileUrl ? `
          <img src="${backendUrl + m.fileUrl}" 
          style="max-width:200px;border-radius:10px;margin-top:5px;">
        ` : ""}

        <div class="timestamp">${time}</div>
      </div>
    `;
  }).join("");

  if (html !== lastRendered) {
    document.getElementById("messages").innerHTML = html;
    document.getElementById("messages").scrollTop =
      document.getElementById("messages").scrollHeight;

    lastRendered = html;
  }
}

/* SEND MESSAGE (FIXED) */
document.getElementById("messageForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const to = document.getElementById("patientSelect").value;
  const msg = document.getElementById("message").value;

  const file =
    document.getElementById("fileInput").files[0] ||
    document.getElementById("cameraInput").files[0];

  const formData = new FormData();
  formData.append("from", doctorEmail);
  formData.append("to", to);
  formData.append("message", msg);

  if (file) {
    formData.append("file", file);
  }

  await fetch(`${backendUrl}/api/messages`, {
    method: "POST",
    body: formData
  });

  document.getElementById("message").value = "";
  document.getElementById("fileInput").value = "";
  document.getElementById("cameraInput").value = "";

  loadMessages();
});

/* CHANGE PATIENT */
document.getElementById("patientSelect").addEventListener("change", () => {
  lastRendered = "";
  loadMessages();
});

loadPatients();
setInterval(loadMessages, 3000);
</script>

</body>
</html>
