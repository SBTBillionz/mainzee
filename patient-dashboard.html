<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patient Dashboard</title>

<style>
body {
  font-family: "Segoe UI", sans-serif;
  background-color: #e5ddd5;
  margin: 0;
}

.chat-container {
  display: flex;
  flex-direction: column;
  height: 100vh;
  max-width: 900px;
  margin: auto;
  background-color: #f0f0f0;
}

.top-bar {
  background-color: #128c7e;
  color: white;
  padding: 15px;
  display: flex;
  justify-content: space-between;
}

.controls {
  padding: 10px;
  background: #fff;
}

select {
  width: 100%;
  padding: 10px;
  margin-bottom: 5px;
}

#messages {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
  background: #fff;
}

.message-bubble {
  max-width: 70%;
  padding: 10px;
  border-radius: 10px;
  margin: 8px 0;
  font-size: 14px;
}

.from-me {
  background: #34b7f1;
  color: white;
  margin-left: auto;
}

.from-them {
  background: #e4e4e4;
}

.timestamp {
  font-size: 10px;
  color: gray;
}

.chat-input {
  display: flex;
  align-items: center;
  padding: 10px;
  background: #eee;
}

.chat-input input {
  flex: 1;
  padding: 10px;
  border-radius: 20px;
  border: none;
}

.icon {
  margin: 0 5px;
  cursor: pointer;
}

#sendBtn {
  background: #25d366;
  border: none;
  color: white;
  border-radius: 50%;
  width: 40px;
  height: 40px;
}
  .emergency-btn {
  background: red;
  color: white;
  border: none;
  padding: 10px;
  margin-top: 5px;
  border-radius: 5px;
  width: 100%;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="chat-container">

  <div class="top-bar">
    <strong>Patient Dashboard</strong>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="controls">
    <select id="specialty">
      <option value="">Select Specialty</option>
      <option value="Oncologist">Oncologist</option>
      <option value="Surgeon">Surgeon</option>
      <option value="Psychiatrist">Psychiatrist</option>
    </select>

    <!-- DOCTOR SELECT (IMPORTANT) -->
    <select id="doctorSelect">
      <option>Select doctor</option>
    </select>
    
    <a href="tel:08139383653">
  <button class="emergency-btn">
    🚨 Emergency Call (08139383653)
  </button>
</a>
  </div>

  <div id="messages"></div>

  <form id="messageForm" class="chat-input">

    <input type="text" id="message" placeholder="Message">

    <label class="icon">📎
      <input type="file" id="fileInput" hidden>
    </label>

    <label class="icon">📷
      <input type="file" id="cameraInput" accept="image/*" capture hidden>
    </label>

    <button id="sendBtn">➤</button>

  </form>

</div>

<script>
const backendUrl = "https://zeeland-hospital-backend-2.onrender.com";
const patientId = localStorage.getItem("patientId");

if (!patientId) window.location.href = "login.html";

let selectedDoctorEmail = "";

// LOGOUT
function logout() {
  localStorage.clear();
  window.location.href = "index.html";
}

// LOAD DOCTORS
document.getElementById("specialty").addEventListener("change", async (e) => {
  const specialty = e.target.value;

  if (!specialty) return;

  const res = await fetch(`${backendUrl}/api/doctors/${specialty}`);
  const doctors = await res.json();

  const select = document.getElementById("doctorSelect");

  select.innerHTML = doctors.map(d =>
    `<option value="${d.email}">${d.name}</option>`
  ).join("");
});

// SELECT DOCTOR
document.getElementById("doctorSelect").addEventListener("change", (e) => {
  selectedDoctorEmail = e.target.value;
});

// LOAD MESSAGES
async function loadMessages() {
  const res = await fetch(`${backendUrl}/api/messages?patientId=${patientId}`);
  const data = await res.json();
  // ✅ MARK MESSAGES AS READ
if (selectedDoctorEmail) {
  await fetch(`${backendUrl}/api/messages/read`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      from: selectedDoctorEmail, // doctor
      to: patientId              // current user
    })
  });
}

  const box = document.getElementById("messages");

  box.innerHTML = data.map(m => {
    const isMe = m.from === patientId;
    const time = new Date(m.createdAt).toLocaleTimeString();

    return `
      <div class="message-bubble ${isMe ? 'from-me' : 'from-them'}">

        <div>${m.message || ""}</div>

        ${m.fileUrl ? `
          <img src="${backendUrl + m.fileUrl}" style="max-width:200px;margin-top:5px;border-radius:8px;">
        ` : ""}

        <div class="timestamp">${time}</div>
      </div>
    `;
  }).join("");

  box.scrollTop = box.scrollHeight;
}

// SEND MESSAGE (UPDATED)
document.getElementById("messageForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  if (!selectedDoctorEmail) {
    alert("Select a doctor first");
    return;
  }

  const msg = document.getElementById("message").value;
  const file =
    document.getElementById("fileInput").files[0] ||
    document.getElementById("cameraInput").files[0];

  const formData = new FormData();
  formData.append("from", patientId);
  formData.append("to", selectedDoctorEmail);
  formData.append("message", msg);

  if (file) formData.append("file", file);

  await fetch(`${backendUrl}/api/messages`, {
    method: "POST",
    body: formData
  });

  document.getElementById("message").value = "";
  document.getElementById("fileInput").value = "";
  document.getElementById("cameraInput").value = "";

  loadMessages();
});

// AUTO REFRESH
setInterval(loadMessages, 3000);
loadMessages();
</script>

</body>
</html>
