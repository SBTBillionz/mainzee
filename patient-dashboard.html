<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patient Dashboard - 23CS Hospital</title>

<style>
body {
  font-family: "Segoe UI", sans-serif;
  background-color: #e5ddd5;
  margin: 0;
}

.chat-container {
  display: flex;
  flex-direction: column;
  height: 100vh;
  width: 100%;
  max-width: 900px;
  margin: auto;
  background-color: #f0f0f0;
}

.top-bar {
  background-color: #128c7e;
  color: white;
  padding: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.controls {
  padding: 10px;
  background: #fff;
}

select, .emergency-btn {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border-radius: 5px;
}

.emergency-btn {
  background: red;
  color: white;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

#messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  background-color: #fff;
}

.message-bubble {
  max-width: 75%;
  padding: 10px;
  border-radius: 10px;
  margin: 8px 0;
  font-size: 14px;
}

.from-me {
  background-color: #34b7f1;
  color: white;
  margin-left: auto;
  text-align: right;
}

.from-them {
  background-color: #e4e4e4;
  color: #333;
  margin-right: auto;
}

#messageForm {
  display: flex;
  padding: 10px;
  background: #eee;
  
}

#message {
  flex: 1;
  padding: 10px;
  border-radius: 20px;
  border: 1px solid #ccc;
}

button {
  background: #128c7e;
  color: white;
  border: none;
  padding: 10px;
  margin-left: 5px;
  border-radius: 20px;
  cursor: pointer;
}

.small-note {
  font-size: 12px;
  color: gray;
  margin-top: 5px;
}
  /* =========================
   📱 RESPONSIVE DESIGN
========================= */

/* Mobile default */
body {
  font-size: 14px;
}

/* Tablet */
@media (min-width: 600px) {
  body {
    font-size: 15px;
  }

  .chat-container {
    max-width: 700px;
  }
}

/* Desktop */
@media (min-width: 1024px) {
  body {
    font-size: 16px;
  }

  .chat-container {
    max-width: 900px;
  }
}

/* Message bubbles adjust */
@media (min-width: 768px) {
  .message-bubble {
    max-width: 60%;
    font-size: 15px;
  }
}

/* Input + button fix */
input, select, button {
  font-size: 16px;
  width: 100%;
}

/* Desktop form layout */
@media (min-width: 768px) {
  #messageForm {
    flex-direction: row;
  }

  #message {
    flex: 1;
  }

  button {
    width: auto;
  }
}
</style>
</head>

<body>

<div class="chat-container">

  <div class="top-bar">
    <strong>Patient Dashboard</strong>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="controls">

    <!-- SPECIALTY -->
    <select id="specialty">
      <option value="">Select Doctor Specialty</option>
      <option value="Oncologist">Oncologist</option>
      <option value="Surgeon">Surgeon</option>
      <option value="Psychiatrist">Psychiatrist</option>
    </select>

    <button class="emergency-btn" onclick="callEmergency()">
      🚨 Emergency Call (08139383653)
    </button>

  </div>

  <div id="messages"></div>

  <form id="messageForm" class="chat-input">

  <!-- EMOJI -->
  <span class="icon">😊</span>

  <!-- TEXT INPUT -->
  <input type="text" id="message" placeholder="Message" />

  <!-- FILE UPLOAD -->
  <label for="fileInput" class="icon">📎</label>
  <input type="file" id="fileInput" hidden />

  <!-- CAMERA -->
  <label for="cameraInput" class="icon">📷</label>
  <input type="file" id="cameraInput" accept="image/*" capture="environment" hidden />

  <!-- SEND / MIC -->
  <button type="submit" id="sendBtn">➤</button>

</form>
</div>

<script>
const backendUrl = "https://zeeland-hospital-backend-2.onrender.com";
const patientId = localStorage.getItem("patientId");

if (!patientId) window.location.href = "login.html";

let selectedDoctorEmail = "";

// LOGOUT
function logout() {
  localStorage.clear();
  window.location.href = "index.html";
}

// EMERGENCY
function callEmergency() {
  window.location.href = "tel:08139383653";
}

// LOAD DOCTORS BY SPECIALTY (IMPORTANT FIX)
document.getElementById("specialty").addEventListener("change", async (e) => {
  const specialty = e.target.value;

  if (!specialty) return;

  try {
    const res = await fetch(`${backendUrl}/api/doctors/${specialty}`);
    const doctors = await res.json();

    const select = document.getElementById("doctorSelect");

    if (doctors.length === 0) {
      select.innerHTML = `<option>No doctors found</option>`;
      return;
    }

    select.innerHTML = doctors.map(d =>
      `<option value="${d.email}">${d.name} (${d.email})</option>`
    ).join("");

    document.getElementById("statusNote").innerText = "Select a doctor to start chatting";

  } catch {
    alert("❌ Failed to load doctors");
  }
});

// SELECT DOCTOR
document.getElementById("doctorSelect").addEventListener("change", (e) => {
  selectedDoctorEmail = e.target.value;
  document.getElementById("statusNote").innerText =
    "Chatting with: " + selectedDoctorEmail;
});

// LOAD MESSAGES
async function loadMessages() {
  try {
    const res = await fetch(`${backendUrl}/api/messages?patientId=${patientId}`);
    const data = await res.json();

    document.getElementById("messages").innerHTML = data.map(m => {
      const isMe = m.from === patientId;

      return `
        <div class="message-bubble ${isMe ? 'from-me' : 'from-them'}">
          ${m.message}
        </div>
      `;
    }).join("");

  } catch {
    document.getElementById("messages").innerText = "❌ Error loading messages.";
  }
}

// SEND MESSAGE
document.getElementById("messageForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  if (!selectedDoctorEmail) {
    alert("⚠️ Please select a doctor first");
    return;
  }

  const msg = document.getElementById("message");

  try {
    await fetch(`${backendUrl}/api/messages`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        from: patientId,
        to: selectedDoctorEmail,
        message: msg.value
      })
    });

    msg.value = "";
    loadMessages();

  } catch {
    alert("❌ Failed to send message");
  }
});

loadMessages();
setInterval(loadMessages, 4000);
</script>

</body>
</html>
